services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /app/db/fotosicai.sqlite
      STORAGE_DIR: /app/storage
      DATA_DIR: /app/DATA
      CONSENT_PATH: /app/legal/consenso.md
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
    volumes:
      - ./db:/app/db
      - ./storage:/app/storage
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mailpit:
    image: axllent/mailpit:latest
    profiles: ["dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_STAGE_MAX_DISTANCE_M: ${VITE_STAGE_MAX_DISTANCE_M:-5000}
        VITE_SICAI_TRACK_BASE_URL: ${VITE_SICAI_TRACK_BASE_URL:-https://sentieroitalia.cai.it/track/si-}
        VITE_TILE_URL: ${VITE_TILE_URL:-https://api.webmapp.it/tiles/{z}/{x}/{y}.png}
        VITE_TILE_ATTRIBUTION: ${VITE_TILE_ATTRIBUTION:-&copy; CAI &copy; OpenStreetMap}
        VITE_APP_ENV: ${VITE_APP_ENV:-production}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-8080}:80"
    volumes:
      - ./storage:/usr/share/nginx/html/storage:ro
