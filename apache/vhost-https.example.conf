# ESEMPIO: copia questo file in un .conf non committato e sostituisci i placeholder.
#
# Placeholder da valorizzare:
# - __PROD_DOMAIN__      es: fotosicai.montagnaservizi.it
# - __ACME_WEBROOT__     es: /var/www/acme-fotosicai
# - __UPSTREAM_URL__     es: http://127.0.0.1:8080/

# HTTP: redirect a HTTPS + percorso challenge Let's Encrypt
<VirtualHost *:80>
    ServerName __PROD_DOMAIN__

    Alias /.well-known/acme-challenge __ACME_WEBROOT__
    <Directory __ACME_WEBROOT__>
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/__PROD_DOMAIN___error.log
    CustomLog ${APACHE_LOG_DIR}/__PROD_DOMAIN___access.log combined
</VirtualHost>

# HTTPS: reverse proxy verso frontend docker (upstream locale)
<VirtualHost *:443>
    ServerName __PROD_DOMAIN__

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/__PROD_DOMAIN__/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/__PROD_DOMAIN__/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Alias /.well-known/acme-challenge __ACME_WEBROOT__
    <Directory __ACME_WEBROOT__>
        Require all granted
    </Directory>

    ProxyPreserveHost On
    ProxyPass /.well-known/acme-challenge !
    ProxyPass / __UPSTREAM_URL__
    ProxyPassReverse / __UPSTREAM_URL__
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    ErrorLog ${APACHE_LOG_DIR}/__PROD_DOMAIN___ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/__PROD_DOMAIN___ssl_access.log combined
    ProxyTimeout 300
</VirtualHost>
